services:
  agentos-db:
    image: agnohq/pgvector:18
    container_name: agentos-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  agentos-api:
    container_name: agentos-api
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-agentos-api}:${IMAGE_TAG:-latest}
    # Keep container port fixed; only host port should vary.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8000"
    volumes:
      - agentos-data:/data
    environment:
      DATA_DIR: /data
      RUNTIME_ENV: prd
      AGNO_DEBUG: "False"
      DB_HOST: agentos-db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_DATABASE: ${DB_DATABASE}
      OS_SECURITY_KEY: ${OS_SECURITY_KEY}
      WAIT_FOR_DB: "True"
      WAIT_FOR_DB_TIMEOUT: "60"
      PRINT_ENV_ON_LOAD: "False"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
      MCP_SERVER_URLS: ${MCP_SERVER_URLS:-none}
      MCP_DISABLED: ${MCP_DISABLED:-1}
      COMPOSIO_DISABLED: ${COMPOSIO_DISABLED:-1}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_EXTERNAL_USER_ID: ${COMPOSIO_EXTERNAL_USER_ID:-${COMPOSIO_EXT_USER_ID:-}}
      COMPOSIO_EXT_USER_ID: ${COMPOSIO_EXT_USER_ID:-}
      AGNO_ASSIST_MCP_SERVER_URLS: ${AGNO_ASSIST_MCP_SERVER_URLS:-}
      PLANE_BASE_URL: ${PLANE_BASE_URL:-}
      PLANE_API_KEY: ${PLANE_API_KEY:-}
      PLANE_WORKSPACE_SLUG: ${PLANE_WORKSPACE_SLUG:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_GROUP_POLICY: ${SLACK_GROUP_POLICY:-open}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    depends_on:
      agentos-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  agentos-data:
